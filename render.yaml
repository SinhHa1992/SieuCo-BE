# Render Blueprint — https://render.com/docs/blueprint-spec
# After connecting this repo: set MONGODB_URI (Atlas) and OPENAI_API_KEY in the service Environment tab.
services:
  - type: web
    name: sieuco-api
    runtime: node
    plan: free
    # NODE_ENV=production makes plain `npm install` skip devDependencies (@types, typescript).
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
